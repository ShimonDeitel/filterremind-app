name: AirFilterReminder
options:
  bundleIdPrefix: com.shimondeitel.filterremind
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  AirFilterReminder:
    type: application
    platform: iOS
    sources:
      - path: AirFilterReminder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.filterremind
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: AirFilterReminder/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  AirFilterReminderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AirFilterReminderTests
      - path: AirFilterReminder.storekit
    dependencies:
      - target: AirFilterReminder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.filterremind.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  AirFilterReminderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AirFilterReminderUITests
    dependencies:
      - target: AirFilterReminder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.filterremind.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  AirFilterReminder:
    build:
      targets:
        AirFilterReminder: all
        AirFilterReminderTests: [test]
        AirFilterReminderUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: AirFilterReminder.storekit
    test:
      config: Debug
      storeKitConfiguration: AirFilterReminder.storekit
      targets:
        - AirFilterReminderTests
        - AirFilterReminderUITests
    archive:
      config: Release
